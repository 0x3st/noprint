name: Chromium Patch Verify

on:
  pull_request:
    paths:
      - "patches/**/*.patch"
      - "scripts/ci_verify_chromium.sh"
      - ".github/workflows/chromium-patch-verify.yml"
  workflow_dispatch:
    inputs:
      chromium_ref:
        description: "Chromium ref to checkout (e.g. origin/main or a commit SHA)"
        required: false
        default: "origin/main"
      build_mode:
        description: "Verification mode"
        required: true
        type: choice
        options:
          - apply-only
          - minimal
          - full
        default: "minimal"
      verify_target:
        description: "GN target used when build_mode=minimal"
        required: false
        default: "chrome/common:common"
      ninja_jobs:
        description: "Ninja parallel jobs"
        required: false
        default: "6"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      CHROMIUM_REF: origin/main
      BUILD_MODE: apply-only
      VERIFY_TARGET: chrome/common:common
      NINJA_JOBS: "6"
      INSTALL_LINUX_DEPS: "1"

    steps:
      - name: Checkout anti-det repo
        uses: actions/checkout@v4

      - name: Init runtime env
        run: |
          echo "CHROMIUM_WORK_DIR=${RUNNER_TEMP}/chromium-work" >> "$GITHUB_ENV"

      - name: Apply workflow_dispatch inputs
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "CHROMIUM_REF=${{ inputs.chromium_ref }}" >> "$GITHUB_ENV"
          echo "BUILD_MODE=${{ inputs.build_mode }}" >> "$GITHUB_ENV"
          echo "VERIFY_TARGET=${{ inputs.verify_target }}" >> "$GITHUB_ENV"
          echo "NINJA_JOBS=${{ inputs.ninja_jobs }}" >> "$GITHUB_ENV"

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker system prune -af || true
          df -h

      - name: Verify patch stack
        run: |
          chmod +x scripts/ci_verify_chromium.sh
          ./scripts/ci_verify_chromium.sh

      - name: Show final disk usage
        if: always()
        run: |
          df -h
          du -sh "${CHROMIUM_WORK_DIR}" || true
